services:
  # Main Backend API
  - type: web
    name: xeno-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CHANNEL_SERVICE_URL
        value: "https://xeno-channel-service.onrender.com"
        
  # Channel Simulator Webhook Service
  - type: web
    name: xeno-channel-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn channel_service.main:app --host 0.0.0.0 --port $PORT
